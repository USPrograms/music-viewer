<!DOCTYPE html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="index.css">

<link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Your App Name">
<link rel="shortcut icon" type="image/png" href="icons/Icon-180.png">
<link rel="apple-touch-icon" href="icons/Icon-180.png">

<meta name="theme-color" content="#1f2d44">
<title>Crises Music</title>
<script src="scripts/main.js" defer></script>
</head>
<body>
    <div class = "top-bar">
            <button id = "toggle-button" aria-label="Toggle left bar">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="middle-section">
                <button id = "previous-button" aria-label="Previous song">
                    <span class="material-symbols-outlined">skip_previous</span>
                </button>
                <h1 id = "song-title">Song Title</h1>
                <button id = "next-button" aria-label="Next song">
                    <span class="material-symbols-outlined">skip_next</span>
                </button>
            </div>
    </div>
    <div class="container">
        <div class="left-bar">
            <select id="set-selector">
                <option value="Set-1">Set 1</option>
                <option value="Set-2">Set 2</option>
                <option value="Set-3">Set 3</option>
            </select>
            <ul id = "song-list">

            </ul>
        </div>

        <div id = "main-content">
            
        </div>
    </div>
    
</body>
